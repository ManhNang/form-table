<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo Tài chính Đa Quốc Gia</title>
    <style>
        table{
            width: 100%;
            border-collapse: collapse;
        }
        caption{
            font-size: 30px;
            font-weight: bold;
            color: red;
            padding-bottom: 10px;
        }
        th, td{
            padding: 10px;
        }
        p{
            font-weight: bold;
        }
    </style>
</head>
<body>
    <table border="1">
        <caption>Báo cáo quý 1 năm 2026</caption>
        <thead>
            <tr>
                <th>Khu vực</th>
                <th>Mảng kinh doanh</th>
                <th>Tháng 1</th>
                <th>Tháng 2</th>
                <th>Tháng 3</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2"><p>Châu Á</p></td>
                <td>Phần cứng</td>
                <td>500$</td>
                <td>600$</td>
                <td>550$</td>
            </tr>
            <tr>
                <td>Phần mềm</td>
                <td>1,000$</td>
                <td>1,200$</td>
                <td>1,100$</td>
            </tr>
            <tr>
                <td><p>Châu Âu</p></td>
                <td>Phần mềm</td>
                <td>800$</td>
                <td>900$</td>
                <td>950$</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2"><p>TỔNG TOÀN CẦU</p></td>
                <td>2,300$</td>
                <td>2,700$</td>
                <td>2,600$</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
